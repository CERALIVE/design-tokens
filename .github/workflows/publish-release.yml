name: Publish @ceralive/design-tokens

# Tag-driven npm publish via OIDC trusted publishing — no NPM_TOKEN.
#   vX.Y.Z        → stable release    → npm dist-tag `latest`
#   vX.Y.Z-rc.N   → release candidate → npm dist-tag `next`
# Auth is the GitHub Actions OIDC identity (id-token: write) exchanged against
# the trusted publisher configured on the npm package; requires npm >= 11.5.1.
# Provenance is auto-generated because this is a public repo.
# A workflow_dispatch run with dry_run=true performs a registry dry-run instead.
#
# NOTE: v0.1.0 is published manually (token in ~/.npmrc) to bootstrap the
# package; this workflow takes over from the first tag push once the trusted
# publisher is configured in npmjs.com.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Force a registry dry-run (no publish)"
        type: boolean
        default: true

# Never cancel an in-flight publish — a half-run release is worse than a queued one.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC identity for npm trusted publishing (+ provenance, public repo)

jobs:
  publish:
    name: Test and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24 # >= trusted-publishing floor (Node 22.14); CeraLive Node-24 baseline
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Upgrade npm to a trusted-publishing-capable version
        run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run build

      - name: Test (token ↔ CSS parity)
        run: npm test

      - name: Tarball guard — only tokens.css + src ship
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          FILES="$(node -p "require('/tmp/pack.json')[0].files.map(f=>f.path).join('\n')")"
          echo "$FILES"
          if echo "$FILES" | grep -vE '^(package\.json|README\.md|LICENSE|tokens\.css|src/)'; then
            echo "::error::tarball contains unexpected files"
            exit 1
          fi

      - name: Select npm dist-tag
        id: tag
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if echo "$PKG" | grep -q -- '-rc'; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm via OIDC trusted publishing (or dry-run)
        env:
          FORCE_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "${FORCE_DRY_RUN}" = "true" ]; then
            echo "Dry-run forced — no publish."
            npm publish --access public --dry-run --tag "${{ steps.tag.outputs.dist_tag }}"
          else
            npm publish --access public --tag "${{ steps.tag.outputs.dist_tag }}"
          fi
